name: Build ExtractIPA iOS App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Xcode
      run: |
        sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
        xcodebuild -version

    - name: Build with Direct Compilation
      run: |
        chmod +x build_ios.sh
        ./build_ios.sh 2>&1 | tee build_output.log

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ExtractIPA-${{ github.run_number }}
        path: build/ExtractIPA.ipa
        retention-days: 30

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: build/ExtractIPA.ipa
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Summary
      run: |
        echo "✅ ExtractIPA Build Complete"
        echo "📦 Archive: build/ExtractIPA.ipa ($(du -h build/ExtractIPA.ipa | cut -f1))"
        echo "🔧 iOS 16.0+ | arm64"
        echo "👤 Harsh Dhamaniya"
