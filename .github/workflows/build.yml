name: Build ExtractIPA iOS App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Xcode
      run: |
        sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
        xcodebuild -version

    - name: Build with xcodebuild (Generic iOS)
      run: |
        mkdir -p build
        xcodebuild \
          -scheme ExtractIPA \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -derivedDataPath build \
          -arch arm64 \
          -verbose \
          build 2>&1 | tee build.log

    - name: Check Build Output
      run: |
        echo "=== Build directory structure ==="
        find build -type f \( -name "ExtractIPA*" -o -name "*.app" \) 2>/dev/null | head -30

        if [ -d "build/Build/Products/Release-iphoneos/ExtractIPA.app" ]; then
          echo ""
          echo "✅ App bundle found!"
          echo ""
          echo "=== App Bundle Contents ==="
          ls -lR build/Build/Products/Release-iphoneos/ExtractIPA.app/

          echo ""
          echo "=== Executable file info ==="
          if [ -f "build/Build/Products/Release-iphoneos/ExtractIPA.app/ExtractIPA" ]; then
            file build/Build/Products/Release-iphoneos/ExtractIPA.app/ExtractIPA
            ls -lh build/Build/Products/Release-iphoneos/ExtractIPA.app/ExtractIPA
            otool -L build/Build/Products/Release-iphoneos/ExtractIPA.app/ExtractIPA 2>/dev/null | head -10 || echo "Binary inspection skipped"
          else
            echo "❌ Binary file not found!"
          fi
        else
          echo ""
          echo "⚠️ App bundle not found in expected location"
          find build -type d -name "*.app" 2>/dev/null
        fi

    - name: Create IPA from App Bundle
      run: |
        # Use the built app bundle
        if [ -d "build/Build/Products/Release-iphoneos/ExtractIPA.app" ]; then
          echo "✅ Creating IPA from built app bundle..."
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/ExtractIPA.app Payload/

          echo ""
          echo "=== Verifying copied bundle ==="
          ls -lh Payload/ExtractIPA.app/ExtractIPA
          file Payload/ExtractIPA.app/ExtractIPA

          # Create IPA (ZIP with proper structure)
          zip -r -q ExtractIPA.ipa Payload/
          echo "✅ IPA created successfully"
        else
          echo "❌ Build failed - no app bundle found"
          echo ""
          echo "=== Build Log Errors ==="
          cat build.log | grep -i "error\|failed" | head -20
          exit 1
        fi

    - name: Verify IPA
      run: |
        echo "IPA File Info:"
        ls -lh ExtractIPA.ipa

        echo ""
        echo "IPA Contents:"
        unzip -l ExtractIPA.ipa | head -40

        echo ""
        echo "Binary check:"
        unzip -p ExtractIPA.ipa Payload/ExtractIPA.app/ExtractIPA | file - || echo "Binary extracted"

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ExtractIPA-${{ github.run_number }}
        path: ExtractIPA.ipa
        retention-days: 30

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ExtractIPA.ipa
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Summary
      run: |
        echo "✅ ExtractIPA Build Complete"
        echo "📦 Archive: ExtractIPA.ipa"
        echo "📊 Size: $(du -h ExtractIPA.ipa | cut -f1)"
        echo "🔧 Platform: iOS 16.0+"
        echo "👤 Developer: Harsh Dhamaniya"
        echo "🔗 Links:"
        echo "   GitHub: https://github.com/harshdhamaniya"
        echo "   LinkedIn: https://www.linkedin.com/in/harshdhamaniya/"

