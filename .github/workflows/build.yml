name: Build ExtractIPA iOS App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Create Xcode Project
      run: |
        mkdir -p Sources
        cp *.swift Sources/ || true

    - name: Build for iOS
      run: |
        # Generate Xcode project from Package.swift
        swift package generate-xcodeproj

        # Build using xcodebuild
        xcodebuild \
          -project ExtractIPA.xcodeproj \
          -scheme ExtractIPA \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -derivedDataPath build \
          -arch arm64 \
          build 2>&1 | tail -50

    - name: Create IPA
      run: |
        # Find and copy the built app bundle
        APP_BUNDLE="build/Build/Products/Release-iphoneos/ExtractIPA.app"

        if [ ! -d "$APP_BUNDLE" ]; then
          echo "ERROR: App bundle not found at $APP_BUNDLE"
          ls -R build/Build/Products/ || echo "Build products directory not found"
          exit 1
        fi

        # Create proper IPA structure
        mkdir -p Payload
        cp -r "$APP_BUNDLE" Payload/

        # Create IPA (just a zip with Payload directory)
        cd Payload
        zip -r ../ExtractIPA.ipa ExtractIPA.app/
        cd ..

        echo "✅ IPA created successfully"
        ls -lh ExtractIPA.ipa
        unzip -l ExtractIPA.ipa | head -20

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ExtractIPA-${{ github.run_number }}
        path: "*.ipa"
        retention-days: 30

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ExtractIPA.ipa
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Summary
      run: |
        echo "✅ Build completed!"
        echo "📦 IPA file ready for deployment"
        if [ -f "ExtractIPA.ipa" ]; then
          echo "📊 Size: $(du -h ExtractIPA.ipa | cut -f1)"
        fi
